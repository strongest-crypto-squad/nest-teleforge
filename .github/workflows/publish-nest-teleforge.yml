name: Publish nest-teleforge to npm

on:
  push:
    tags:
      - "nest-teleforge-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package name
        run: |
          PKG_NAME=$(node -p "require('./libs/nest-teleforge/package.json').name")
          if [ "$PKG_NAME" = "@your-scope/nest-teleforge" ] || [ "$PKG_NAME" = "nest-teleforge" ]; then
            echo "Set a real publishable package name in libs/nest-teleforge/package.json before publishing."
            exit 1
          fi

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/nest-teleforge-v')
        run: |
          VERSION="${GITHUB_REF_NAME#nest-teleforge-v}"
          cd libs/nest-teleforge
          npm version "$VERSION" --no-git-tag-version

      - name: Build library
        run: pnpm run lib:build

      - name: Publish to npm
        run: |
          cd libs/nest-teleforge
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
